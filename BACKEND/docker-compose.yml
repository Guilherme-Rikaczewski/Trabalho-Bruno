version: '3.9'

services:
  database:
    image: postgres:16
    container_name: database
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # frontend:
  #   build:
  #     context: ./FRONTEND
  #     dockerfile: Dockerfile.frontend.v1
  #   container_name: frontend
  #   working_dir: /app
  #   # ports:
  #   #   - "3000:3000"
  #   environment:
  #     VITE_API_BASE_URL: ${VITE_API_BASE_URL}
  #   volumes:
  #     - frontend_dist:/app/dist
  #   networks:
  #     - app_network
    
  backend:
    build: 
      context: ./BACKEND
      dockerfile: Dockerfile.backend.v1
    container_name: backend
    restart: always
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app_network

  # nginx:
  #   image: nginx:alpine
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - frontend_dist:/usr/share/nginx/html
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - app_network
  
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  # frontend_dist:
  redis_data:

networks:
  app_network: