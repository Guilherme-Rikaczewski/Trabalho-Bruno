version: '3.9'

services:
  database:
    image: postgres:16
    container_name: database
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    
  backend:
    build: 
      context: ./BACKEND
      dockerfile: Dockerfile.dev.backend.v1
    # image: guilhermerikaczewski/rogues:backend-1.0.0
    container_name: backend
    restart: always
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app_network

  nginx:
    # image: guilhermerikaczewski/rogues:frontend-1.0.1
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile.dev.frontend.v1
    restart: always
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network
  
  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    # ports:
    #   - "6379:6379"

volumes:
  postgres_data:
  redis_data:

networks:
  app_network: